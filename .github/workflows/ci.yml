name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --dev --extra svg

      - name: Ruff check
        run: uv run ruff check scratch/

      - name: Ruff format
        run: uv run ruff format --check scratch/

      - name: Mypy check
        run: uv run mypy --explicit-package-bases scratch/

      - name: Pytest
        run: uv run python -m pytest tests/ -v

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install scratch-vm for sb3 validation
        run: npm install
        working-directory: tests/verifier

      - name: Validate .sb3 files against scratch-vm
        run: uv run python -m pytest tests/test_sb3_validation.py -v
